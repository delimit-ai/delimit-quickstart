name: Delimit

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  delimit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check API compatibility
        uses: delimit-ai/delimit-action@v1
        with:
          old_spec: openapi.yaml
          new_spec: openapi-changed.yaml
          mode: enforce
